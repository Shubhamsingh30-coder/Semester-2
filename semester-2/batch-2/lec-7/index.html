<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="input-container">
        <input type="text" name="" id="locationInput" placeholder="Enter location" />
        <button id="search">Search</button>
      </div>
    </header>

    <main>
      <div class="weather-container">
        <div class="temperature"></div>
        12.5^C
        <div class="location-date">
          <div class="location">Delhi</div>
          <span class="time">12:33</span>
          <span class="day">Friday</span>
          <span class="date">30-01-2026</span>
        </div>
        <div class="weather-status">
          <div class="icon">
            <img
              src="https://ico.hugeicons.com/sun-cloud-02-stroke-rounded@2x.webp?v=1.0.1"
              alt="weather-status-image"
            />
          </div>
          <div class="condition">Sunny</div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
